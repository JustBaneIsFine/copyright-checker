name: Build and release

# On every push to main: builds Windows + both macOS apps and uploads them as
# Actions artifacts (for quick testing).
# On a version tag (e.g. v1.0.0): does the same, then publishes a GitHub Release with
# all three zips attached - giving permanent public download links and per-file
# download counts.

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------- macOS (both archs)
  build-mac:
    name: build-mac-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13   # Intel (x86_64): runs on Intel + Apple Silicon (Rosetta)
            arch: intel
          - runner: macos-14   # Apple Silicon (arm64): native on M1/M2/M3/M4
            arch: apple-silicon
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Bundle a macOS ffmpeg
        run: |
          brew install ffmpeg
          mkdir -p bin
          cp "$(which ffmpeg)" bin/ffmpeg
          chmod +x bin/ffmpeg
      - name: Install build dependencies
        run: pip install flask pywebview pyinstaller
      - name: Build the app
        run: |
          pyinstaller --windowed --clean --noconfirm \
            --name "DJ Copyright Prep" \
            --icon icon.icns \
            --add-data "bin:bin" \
            --collect-all webview \
            --exclude-module tkinter \
            app.py
      - name: Zip the app
        run: cd dist && zip -q -r -y "DJCopyrightPrep_mac_${{ matrix.arch }}.zip" "DJ Copyright Prep.app"
      - uses: actions/upload-artifact@v4
        with:
          name: DJCopyrightPrep_mac_${{ matrix.arch }}
          path: dist/DJCopyrightPrep_mac_${{ matrix.arch }}.zip

  # -------------------------------------------------------------------------- Windows
  build-windows:
    name: build-windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch ffmpeg (essentials)
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ff.zip
          Expand-Archive ff.zip -DestinationPath fftmp -Force
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          $exe = Get-ChildItem -Recurse fftmp -Filter ffmpeg.exe | Select-Object -First 1
          Copy-Item $exe.FullName bin/ffmpeg.exe
      - name: Fetch WebView2 bootstrapper
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path redist | Out-Null
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile redist/MicrosoftEdgeWebview2Setup.exe
      - name: Install build dependencies
        run: pip install flask pywebview pyinstaller
      - name: Build the app
        run: pyinstaller --onedir --noconsole --clean --noconfirm --name DJCopyrightPrep --icon icon.ico --add-data "bin;bin" --add-data "redist;redist" --collect-all webview --collect-all pythonnet --collect-all clr_loader --copy-metadata pythonnet --exclude-module tkinter app.py
      - name: Zip the app
        shell: pwsh
        run: Compress-Archive -Path "dist/DJCopyrightPrep" -DestinationPath "dist/DJCopyrightPrep_windows.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: DJCopyrightPrep_windows
          path: dist/DJCopyrightPrep_windows.zip

  # ----------------------------------------------------- Publish a Release (tags only)
  release:
    name: publish-release
    needs: [build-mac, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Collect all built zips
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
