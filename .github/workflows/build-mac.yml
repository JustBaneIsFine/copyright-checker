name: Build macOS app

# Builds a ready-to-run macOS .app on a real (cloud) Mac and uploads it as a
# downloadable artifact. Run it from the repo's Actions tab (Run workflow), or it
# runs automatically on every push to main.

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-mac:
    # macos-14 = Apple Silicon (arm64) runners, which get picked up quickly (the Intel
    # macos-13 queue can be very long). This builds a NATIVE Apple-Silicon app - it runs
    # on M1/M2/M3/M4 Macs (the vast majority today) but NOT on older Intel Macs.
    runs-on: macos-14

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Bundle a macOS ffmpeg
        run: |
          brew install ffmpeg
          mkdir -p bin
          cp "$(which ffmpeg)" bin/ffmpeg
          chmod +x bin/ffmpeg

      - name: Install build dependencies
        run: pip install flask pywebview pyinstaller

      - name: Build the app
        run: |
          pyinstaller --windowed --clean --noconfirm \
            --name "DJ Copyright Prep" \
            --icon icon.icns \
            --add-data "bin:bin" \
            --collect-all webview \
            --exclude-module tkinter \
            app.py

      - name: Zip the app
        run: |
          cd dist
          zip -q -r -y DJCopyrightPrep_mac.zip "DJ Copyright Prep.app"

      - name: Upload the macOS app
        uses: actions/upload-artifact@v4
        with:
          name: DJCopyrightPrep_mac
          path: dist/DJCopyrightPrep_mac.zip
