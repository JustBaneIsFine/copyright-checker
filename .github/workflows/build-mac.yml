name: Build macOS apps

# Builds BOTH macOS variants on every push (and on-demand), each as its own download:
#   * Intel (x86_64)        -> runs on Intel Macs natively AND Apple Silicon via Rosetta
#   * Apple Silicon (arm64) -> native on M1/M2/M3/M4 Macs (faster there)
# Grab whichever matches your tester from the run's Artifacts section.

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-mac:
    name: build-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false   # if the Intel runner queue is slow, don't hold up Apple Silicon
      matrix:
        include:
          - runner: macos-13   # Intel (x86_64)
            arch: intel
          - runner: macos-14   # Apple Silicon (arm64)
            arch: apple-silicon

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Bundle a macOS ffmpeg (matches the runner's architecture)
        run: |
          brew install ffmpeg
          mkdir -p bin
          cp "$(which ffmpeg)" bin/ffmpeg
          chmod +x bin/ffmpeg

      - name: Install build dependencies
        run: pip install flask pywebview pyinstaller

      - name: Build the app
        run: |
          pyinstaller --windowed --clean --noconfirm \
            --name "DJ Copyright Prep" \
            --icon icon.icns \
            --add-data "bin:bin" \
            --collect-all webview \
            --exclude-module tkinter \
            app.py

      - name: Zip the app
        run: |
          cd dist
          zip -q -r -y "DJCopyrightPrep_mac_${{ matrix.arch }}.zip" "DJ Copyright Prep.app"

      - name: Upload the macOS app
        uses: actions/upload-artifact@v4
        with:
          name: DJCopyrightPrep_mac_${{ matrix.arch }}
          path: dist/DJCopyrightPrep_mac_${{ matrix.arch }}.zip
