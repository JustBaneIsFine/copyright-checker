name: Build and release

# Push to main: builds the apps and uploads them as artifacts (for testing).
# Tag v* : same, then publishes a GitHub Release with the zips attached (permanent
#          public download links + per-file download counts).
#
# The release waits only on Windows + Apple Silicon, so the scarce Intel runners can
# never block a release. The Intel app is best-effort and gets folded in whenever its
# runner is available.

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

# A newer run on the same ref cancels an older in-progress one, so runs don't pile up.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-mac-arm:
    name: build-mac-apple-silicon
    runs-on: macos-14            # Apple Silicon (arm64), allocates quickly
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Bundle a macOS ffmpeg
        run: |
          brew install ffmpeg
          mkdir -p bin && cp "$(which ffmpeg)" bin/ffmpeg && chmod +x bin/ffmpeg
      - run: pip install flask pywebview pyinstaller
      - name: Build
        run: |
          pyinstaller --windowed --clean --noconfirm --name "DJ Copyright Prep" \
            --icon icon.icns --add-data "bin:bin" --collect-all webview \
            --exclude-module tkinter app.py
      - run: cd dist && zip -q -r -y "DJCopyrightPrep_mac_apple-silicon.zip" "DJ Copyright Prep.app"
      - uses: actions/upload-artifact@v4
        with:
          name: DJCopyrightPrep_mac_apple-silicon
          path: dist/DJCopyrightPrep_mac_apple-silicon.zip

  build-mac-intel:
    name: build-mac-intel
    if: startsWith(github.ref, 'refs/tags/v')   # only for releases, not every push
    runs-on: macos-13            # Intel (x86_64); runners can be slow to allocate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Bundle a macOS ffmpeg
        run: |
          brew install ffmpeg
          mkdir -p bin && cp "$(which ffmpeg)" bin/ffmpeg && chmod +x bin/ffmpeg
      - run: pip install flask pywebview pyinstaller
      - name: Build
        run: |
          pyinstaller --windowed --clean --noconfirm --name "DJ Copyright Prep" \
            --icon icon.icns --add-data "bin:bin" --collect-all webview \
            --exclude-module tkinter app.py
      - run: cd dist && zip -q -r -y "DJCopyrightPrep_mac_intel.zip" "DJ Copyright Prep.app"
      - uses: actions/upload-artifact@v4
        with:
          name: DJCopyrightPrep_mac_intel
          path: dist/DJCopyrightPrep_mac_intel.zip

  build-windows:
    name: build-windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch ffmpeg (essentials)
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ff.zip
          Expand-Archive ff.zip -DestinationPath fftmp -Force
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          $exe = Get-ChildItem -Recurse fftmp -Filter ffmpeg.exe | Select-Object -First 1
          Copy-Item $exe.FullName bin/ffmpeg.exe
      - name: Fetch WebView2 bootstrapper
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path redist | Out-Null
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile redist/MicrosoftEdgeWebview2Setup.exe
      - run: pip install flask pywebview pyinstaller
      - name: Build
        run: pyinstaller --onedir --noconsole --clean --noconfirm --name DJCopyrightPrep --icon icon.ico --add-data "bin;bin" --add-data "redist;redist" --collect-all webview --collect-all pythonnet --collect-all clr_loader --copy-metadata pythonnet --exclude-module tkinter app.py
      - name: Zip
        shell: pwsh
        run: Compress-Archive -Path "dist/DJCopyrightPrep" -DestinationPath "dist/DJCopyrightPrep_windows.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: DJCopyrightPrep_windows
          path: dist/DJCopyrightPrep_windows.zip

  release:
    name: publish-release
    needs: [build-mac-arm, build-windows]   # NOT build-mac-intel, so Intel can't block
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out (for the changelog file)
        uses: actions/checkout@v4
      - name: Collect all built zips
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          body_path: RELEASE_NOTES.md
